[env]
# Keep Python user installs out of the system prefix.
PYTHONUSERBASE = "{{ env.HOME }}/.local"

[tools]
ruby = "4.0.6"
python = "3.14.6"

[tasks]
syntax = """
set -eu
for file in Formula/*.rb lib/*.rb scripts/*.rb test/*.rb; do
  [ -f "$file" ] && ruby -c "$file"
done
bash -n scripts/ci_formulae.sh
python3 -m py_compile scripts/renovate_bump.py test/test_renovate_bump.py
"""

yaml = """
ruby -e 'require "yaml"; Dir[".github/workflows/*.yml", ".yamllint.yml"].each { |file| YAML.load_file(file) }'
"""

conflict-markers = """
! rg -n --glob '!.git/**' --glob '!.mise.toml' '<<<<<<<|=======|>>>>>>>|\\|\\|\\|\\|\\|\\|\\|' .
"""

style = "brew style Formula/*.rb lib/*.rb"

audit = "scripts/ci_formulae.sh audit"

pre-commit = "pre-commit run --all-files --show-diff-on-failure"

lint = "mise run syntax && mise run yaml && mise run conflict-markers && mise run style"

install = "brew install adyranov/tap/${FORMULA:-llama-cpp}"

test = "brew test adyranov/tap/${FORMULA:-llama-cpp}"

test-offline = """
ruby -Ilib -Itest test/test_bump_ggml_metal_dist_formulae.rb && \
ruby -Ilib -Itest test/test_ci_formulae.rb && \
python3 test/test_renovate_bump.py
"""
