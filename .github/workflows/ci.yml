name: CI

on:
  pull_request:
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/renovate.json5"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/renovate.json5"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  brew:
    name: Homebrew (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs-on: macos-15
          - arch: x86_64
            runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.arch }}"

      - name: Tap local checkout
        run: brew tap --force adyranov/tap "$GITHUB_WORKSPACE"

      - name: Trust local tap
        run: brew trust adyranov/tap

      - name: Audit all formulae
        run: >-
          brew audit --strict --online --formula
          adyranov/tap/llama-cpp
          adyranov/tap/whisper-cpp
          adyranov/tap/stable-diffusion-cpp
          adyranov/tap/acestep-cpp
          adyranov/tap/crispasr
          adyranov/tap/omnivoice-cpp

      - name: Style formulae
        run: brew style Formula/*.rb lib/*.rb

      - name: Install and test co-installable bundle with whisper-cpp
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          set -euo pipefail
          for formula in llama-cpp stable-diffusion-cpp acestep-cpp crispasr omnivoice-cpp whisper-cpp; do
            brew install --formula "adyranov/tap/$formula"
            brew test "adyranov/tap/$formula"
          done

      - name: Assert core conflicts (llama.cpp, whisper-cpp)
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          set -euo pipefail
          if brew install --formula llama.cpp 2>&1; then
            echo "expected conflict: llama.cpp vs tap llama-cpp"
            exit 1
          fi
          if brew install --formula whisper-cpp 2>&1; then
            echo "expected conflict: core whisper-cpp vs tap whisper-cpp"
            exit 1
          fi

      - name: Assert binary renames
        run: |
          set -euo pipefail
          test -x "$(brew --prefix)/bin/ace-quantize"
          test -x "$(brew --prefix)/bin/omnivoice-quantize"
          test -x "$(brew --prefix)/bin/omnivoice-tts-server"
          ! test -e "$(brew --prefix)/bin/quantize"
          test -x "$(brew --prefix)/bin/parakeet-cli"
