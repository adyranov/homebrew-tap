name: CI

on:
  pull_request:
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/workflows/ci.yml"
      - "scripts/ci_formulae.sh"
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/workflows/ci.yml"
      - "scripts/ci_formulae.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  brew:
    name: Homebrew (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs-on: macos-15
          - arch: x86_64
            runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.arch }}"

      - name: Cache Homebrew (gems, bottles, API)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cache-${{ runner.os }}-v1
          restore-keys: |
            brew-cache-${{ runner.os }}-

      - name: Prepare runner
        run: scripts/ci_formulae.sh prepare-runner

      - name: Tap local checkout
        run: brew tap --force adyranov/tap "$GITHUB_WORKSPACE"

      - name: Trust local tap
        run: brew trust adyranov/tap

      - name: Audit all formulae
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: scripts/ci_formulae.sh audit

      - name: Style formulae
        run: brew style Formula/*.rb lib/*.rb

      - name: Validate livecheck
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: scripts/ci_formulae.sh livecheck

      - name: Install and test all formulae
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: scripts/ci_formulae.sh install-test

      - name: Verify installed bin files
        run: scripts/ci_formulae.sh verify-bins

      - name: Check linkage
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: scripts/ci_formulae.sh linkage

      - name: Check Mach-O architecture of shipped binaries
        run: scripts/ci_formulae.sh verify-arch ${{ matrix.arch }}

      - name: Assert core conflicts (llama.cpp, whisper-cpp)
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: scripts/ci_formulae.sh conflicts

      - name: Assert binary renames
        run: scripts/ci_formulae.sh renames
