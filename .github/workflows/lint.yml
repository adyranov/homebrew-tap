name: Lint

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/renovate.json5"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".mise.toml"
      - ".editorconfig"
      - ".gitattributes"
      - ".markdownlint.jsonc"
      - ".yamllint.yml"
      - "_typos.toml"
      - "AGENTS.md"
  pull_request:
    paths:
      - "Formula/**"
      - "lib/**"
      - ".github/renovate.json5"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".mise.toml"
      - ".editorconfig"
      - ".gitattributes"
      - ".markdownlint.jsonc"
      - ".yamllint.yml"
      - "_typos.toml"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Repository lint
    runs-on: macos-15
    timeout-minutes: 15
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Run lint checks
        run: mise run lint

      - name: Install pre-commit
        run: python -m pip install --user pre-commit==4.6.0

      - name: Run pre-commit hooks
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Validate Renovate config
        run: npx --yes --package renovate renovate-config-validator .github/renovate.json5
