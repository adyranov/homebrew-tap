name: Lint

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - "lib/**"
      - "scripts/**"
      - "test/**"
      - ".github/renovate.json5"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".mise.toml"
      - ".editorconfig"
      - ".gitattributes"
      - ".markdownlint.jsonc"
      - ".yamllint.yml"
      - "_typos.toml"
      - "AGENTS.md"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Repository lint
    runs-on: macos-26
    timeout-minutes: 15
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Run lint checks
        run: mise run lint

      - name: Cache pip packages
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache pre-commit environments
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            precommit-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml', '.github/renovate.json5') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: python -m pip install --user pre-commit==4.6.0

      - name: Run pre-commit hooks
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Validate Renovate config
        run: npx --yes --package renovate@41.140.1 renovate-config-validator .github/renovate.json5

      - name: Run offline tests
        run: mise run test-offline
