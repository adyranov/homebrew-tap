name: Renovate Bump

on:
  push:
    branches:
      - renovate/ggml-metal-dist-formulae

permissions:
  contents: write

jobs:
  bump-formulae:
    name: Bump remaining formulae
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract new version and bump
        run: |
          set -euo pipefail
          # Extract the version bumped by Renovate in the canary file
          VERSION=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' Formula/llama-cpp.rb | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from Formula/llama-cpp.rb"
            exit 1
          fi
          echo "Bumping formulae to $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ruby scripts/bump_ggml_metal_dist_formulae.rb "$VERSION"

      - name: Commit and push changes
        run: |
          if ! git diff --quiet; then
            git config user.name "renovate[bot]"
            git config user.email "29139614+renovate[bot]@users.noreply.github.com"
            git add Formula/*.rb
            git commit -m "build(tools): auto-bump remaining ggml-metal-dist formulae to $VERSION"
            git push
          else
            echo "No changes to commit."
          fi
